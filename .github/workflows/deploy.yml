name: Deploy to Hostinger

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload site via FTPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare public deploy package
        run: |
          set -euo pipefail
          mkdir -p .deploy-package
          cp -R assets .deploy-package/assets
          cp ./*.html .deploy-package/

          if [ -f ".htaccess" ]; then
            cp .htaccess .deploy-package/.htaccess
          fi

          if [ -f "robots.txt" ]; then
            cp robots.txt .deploy-package/robots.txt
          fi

      - name: Deploy files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./.deploy-package/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          exclude: |
            **/.DS_Store
            .well-known/**
            cgi-bin/**
            .ftpquota
